services:
  # ─── PostgreSQL 15 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: integracao-saude-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: integracao_saude
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── API NestJS ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: integracao-saude-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/integracao_saude?schema=public"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
